<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIMG Cleaner v3.0 | Universal Remover</title>
    
    <!-- Core Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        cyber: {
                            500: '#0ea5e9',
                            600: '#0284c7',
                            dark: '#020617',
                            panel: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #020617; color: #f8fafc; overscroll-behavior: none; }
        html, body, #root { height: 100dvh; overflow: hidden; }
        
        .checkerboard {
            background-color: #1e293b;
            background-image: 
                linear-gradient(45deg, #0f172a 25%, transparent 25%), 
                linear-gradient(-45deg, #0f172a 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #0f172a 75%), 
                linear-gradient(-45deg, transparent 75%, #0f172a 75%);
            background-size: 20px 20px;
        }

        .selection-box {
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            border: 2px solid #0ea5e9;
        }

        .handle {
            width: 20px; height: 20px;
            background: #0ea5e9;
            border: 2px solid white;
            border-radius: 50%;
            position: absolute;
            z-index: 50;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- ICONS ---
        const Icons = {
            Auto: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>,
            Manual: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
            Upload: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Eraser: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 20H7L3 16C2 15 2 13 3 12L13 2L22 11L20 20Z"/><path d="M11 11L20 20"/></svg>,
            Download: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
        };

        // --- MANUAL ERASER COMPONENT ---
        const ManualEraser = ({ img, onSave }) => {
            const canvasRef = useRef(null);
            const [selection, setSelection] = useState({ x: 50, y: 80, w: 40, h: 15 }); // Percentages
            const [mode, setMode] = useState('fillLeft'); // fillLeft, blur, color
            const isDragging = useRef(null); // 'move', 'nw', 'se', etc.

            // Draw initial image
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                
                // Fit canvas to container while maintaining aspect ratio
                const parent = canvas.parentElement;
                const scale = Math.min(parent.clientWidth / img.width, parent.clientHeight / img.height);
                canvas.width = img.width;
                canvas.height = img.height;
                
                // We store the "Clean" state in a separate canvas or just redraw image on reset
                ctx.drawImage(img, 0, 0);
            }, [img]);

            const handleErase = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const w = canvas.width;
                const h = canvas.height;

                // Convert % to pixels
                const sx = (selection.x / 100) * w;
                const sy = (selection.y / 100) * h;
                const sw = (selection.w / 100) * w;
                const sh = (selection.h / 100) * h;

                if (mode === 'fillLeft') {
                    // Smart Fill: Take a 5px slice from the left of selection and repeat it
                    const sliceWidth = 2; 
                    const sourceX = Math.max(0, sx - sliceWidth);
                    
                    // Get the slice
                    try {
                        // We repeat the slice horizontally
                        for (let i = 0; i < sw; i += sliceWidth) {
                             ctx.drawImage(
                                canvas, 
                                sourceX, sy, sliceWidth, sh, // Source
                                sx + i, sy, sliceWidth, sh   // Dest
                            );
                        }
                    } catch(e) { console.error(e); }
                } else if (mode === 'fillRight') {
                     // Smart Fill from Right
                    const sliceWidth = 2; 
                    const sourceX = Math.min(w - sliceWidth, sx + sw);
                    for (let i = 0; i < sw; i += sliceWidth) {
                             ctx.drawImage(
                                canvas, 
                                sourceX, sy, sliceWidth, sh, 
                                sx + i, sy, sliceWidth, sh 
                            );
                        }
                } else if (mode === 'blur') {
                    // Simple Blur (approximate by downscaling)
                    // Note: Real gaussian blur in canvas requires pixel manipulation loop, keeping it simple here
                    ctx.filter = 'blur(10px)';
                    ctx.drawImage(canvas, sx, sy, sw, sh, sx, sy, sw, sh);
                    ctx.filter = 'none';
                }
            };

            // Selection Logic
            const updateSelection = (clientX, clientY) => {
                if (!isDragging.current || !canvasRef.current) return;
                const rect = canvasRef.current.getBoundingClientRect();
                const xPct = ((clientX - rect.left) / rect.width) * 100;
                const yPct = ((clientY - rect.top) / rect.height) * 100;

                setSelection(prev => {
                    let newSel = { ...prev };
                    if (isDragging.current === 'move') {
                        newSel.x = xPct - (prev.w / 2);
                        newSel.y = yPct - (prev.h / 2);
                    } else if (isDragging.current === 'se') {
                        newSel.w = Math.max(1, xPct - prev.x);
                        newSel.h = Math.max(1, yPct - prev.y);
                    }
                    return newSel;
                });
            };

            const handleStart = (type) => { isDragging.current = type; };
            const handleEnd = () => { isDragging.current = null; };

            return (
                <div className="flex flex-col h-full">
                    {/* Toolbar */}
                    <div className="bg-slate-900 p-2 flex gap-2 overflow-x-auto border-b border-slate-800 shrink-0">
                        <button onClick={() => setMode('fillLeft')} className={`px-3 py-2 text-xs rounded border ${mode==='fillLeft'?'bg-cyber-600 border-cyber-500':'border-slate-700 hover:bg-slate-800'}`}>
                            ⬅️ Clone Left (Best for Bars)
                        </button>
                        <button onClick={() => setMode('fillRight')} className={`px-3 py-2 text-xs rounded border ${mode==='fillRight'?'bg-cyber-600 border-cyber-500':'border-slate-700 hover:bg-slate-800'}`}>
                            ➡️ Clone Right
                        </button>
                        <button onClick={() => setMode('blur')} className={`px-3 py-2 text-xs rounded border ${mode==='blur'?'bg-cyber-600 border-cyber-500':'border-slate-700 hover:bg-slate-800'}`}>
                            💧 Blur
                        </button>
                    </div>

                    {/* Canvas Container */}
                    <div 
                        className="flex-1 relative bg-black flex items-center justify-center overflow-hidden touch-none"
                        onMouseMove={(e) => updateSelection(e.clientX, e.clientY)}
                        onTouchMove={(e) => updateSelection(e.touches[0].clientX, e.touches[0].clientY)}
                        onMouseUp={handleEnd}
                        onTouchEnd={handleEnd}
                    >
                        <div className="relative shadow-2xl">
                            <canvas ref={canvasRef} className="max-w-full max-h-[70vh] block" />
                            
                            {/* Selection Overlay */}
                            <div 
                                className="absolute selection-box cursor-move"
                                style={{
                                    left: `${selection.x}%`, top: `${selection.y}%`,
                                    width: `${selection.w}%`, height: `${selection.h}%`
                                }}
                                onMouseDown={() => handleStart('move')}
                                onTouchStart={() => handleStart('move')}
                            >
                                {/* Resize Handle */}
                                <div 
                                    className="handle -bottom-2 -right-2 cursor-nwse-resize"
                                    onMouseDown={(e) => { e.stopPropagation(); handleStart('se'); }}
                                    onTouchStart={(e) => { e.stopPropagation(); handleStart('se'); }}
                                ></div>
                            </div>
                        </div>
                    </div>

                    {/* Actions */}
                    <div className="p-4 bg-slate-900 border-t border-slate-800 flex gap-4 shrink-0">
                        <button 
                            onClick={handleErase}
                            className="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-xl shadow-lg flex items-center justify-center gap-2"
                        >
                            <Icons.Eraser /> ERASE AREA
                        </button>
                        <button 
                            onClick={() => onSave(canvasRef.current.toDataURL())}
                            className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl shadow-lg flex items-center justify-center gap-2"
                        >
                            <Icons.Download /> SAVE
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [imgSrc, setImgSrc] = useState(null);
            const [imgObj, setImgObj] = useState(null);
            const [tab, setTab] = useState('upload'); // upload, manual

            const handleDrop = (file) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        setImgObj(img);
                        setImgSrc(e.target.result);
                        setTab('manual'); // Auto switch to manual for generic images
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            };

            const download = (url) => {
                const link = document.createElement('a');
                link.download = 'cleaned_image.png';
                link.href = url;
                link.click();
            };

            return (
                <div className="flex flex-col h-full bg-slate-950 font-sans">
                    {/* Header */}
                    <header className="h-14 bg-slate-900 border-b border-slate-800 flex items-center px-4 justify-between shrink-0">
                        <div className="font-bold text-white flex items-center gap-2">
                            <span className="bg-cyber-600 px-2 rounded text-sm">v3.0</span> GIMG Cleaner
                        </div>
                        {imgSrc && (
                            <button onClick={() => { setImgSrc(null); setTab('upload'); }} className="text-xs text-slate-400 underline">New Image</button>
                        )}
                    </header>

                    {/* Content */}
                    <main className="flex-1 flex flex-col overflow-hidden">
                        {tab === 'upload' && (
                            <div className="flex-1 flex items-center justify-center p-6 bg-slate-950">
                                <label className="w-full max-w-md aspect-square border-2 border-dashed border-slate-700 rounded-2xl flex flex-col items-center justify-center bg-slate-900/50 hover:border-cyber-500 cursor-pointer transition-colors">
                                    <input type="file" className="hidden" accept="image/*" onChange={(e) => e.target.files[0] && handleDrop(e.target.files[0])} />
                                    <div className="text-cyber-500 mb-4 scale-150"><Icons.Upload /></div>
                                    <h3 className="text-white font-bold text-lg">Upload Image</h3>
                                    <p className="text-slate-400 text-sm mt-2 text-center px-4">Remove Gemini Watermarks OR Custom Logos</p>
                                </label>
                            </div>
                        )}

                        {tab === 'manual' && imgObj && (
                            <ManualEraser img={imgObj} onSave={download} />
                        )}
                    </main>

                    {/* Mode Switcher (If image loaded) */}
                    {imgSrc && (
                        <div className="bg-slate-900 p-1 flex text-xs font-bold border-t border-slate-800 shrink-0">
                           <div className="px-4 py-2 text-slate-400 flex-1 text-center">
                                MANUAL MODE ACTIVE
                           </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
