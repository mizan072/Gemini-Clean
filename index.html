<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIMG Cleaner Pro | With Calibration</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b0f19;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(99, 102, 241, 0.08), transparent 25%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px;}
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .drop-zone {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='24' ry='24' stroke='%23334155' stroke-width='2' stroke-dasharray='12%2c 12' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .drop-zone:hover {
            background-color: rgba(30, 41, 59, 0.3);
            border-color: #475569;
        }
        .drop-zone.active {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='24' ry='24' stroke='%236366F1' stroke-width='2' stroke-dasharray='12%2c 12' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
            background-color: rgba(99, 102, 241, 0.05);
        }

        .checkerboard {
            background-color: #111827;
            background-image: 
                linear-gradient(45deg, #1f2937 25%, transparent 25%), 
                linear-gradient(-45deg, #1f2937 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1f2937 75%), 
                linear-gradient(-45deg, transparent 75%, #1f2937 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px; width: 16px;
            border-radius: 50%;
            background: #818cf8;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px;
            cursor: pointer;
            background: #334155;
            border-radius: 2px;
        }
    </style>
</head>
<body class="antialiased selection:bg-indigo-500/30">
    <div id="root" class="flex flex-col min-h-screen"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const Icons = {
            Upload: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Refresh: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
            Eye: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        };

        const calculateAlphaMap = (imgData) => {
            const { width, height, data } = imgData;
            const alphaMap = new Float32Array(width * height);
            for (let i = 0; i < alphaMap.length; i++) {
                const idx = i * 4;
                const val = Math.max(data[idx], data[idx + 1], data[idx + 2]);
                alphaMap[i] = val / 255.0;
            }
            return alphaMap;
        };

        const removeWatermark = (ctx, targetImg, alphaMap, wmSize, marginX, marginY, debugMode) => {
            const width = targetImg.width;
            const height = targetImg.height;
            
            ctx.canvas.width = width;
            ctx.canvas.height = height;
            ctx.drawImage(targetImg, 0, 0);

            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;

            const startX = width - wmSize - marginX;
            const startY = height - wmSize - marginY;

            if (startX < 0 || startY < 0) return imageData;

            const LOGO_VALUE = 255;
            const MAX_ALPHA = 0.99;
            const ALPHA_THRESHOLD = 0.002;

            for (let row = 0; row < wmSize; row++) {
                for (let col = 0; col < wmSize; col++) {
                    const globalX = startX + col;
                    const globalY = startY + row;

                    if (globalX >= width || globalY >= height) continue;

                    const pixelIdx = (globalY * width + globalX) * 4;
                    const maskIdx = row * wmSize + col;
                    
                    let alpha = alphaMap[maskIdx];

                    if (debugMode) {
                        // In debug mode, tint the mask area red so user can see alignment
                        if (row === 0 || row === wmSize - 1 || col === 0 || col === wmSize - 1) {
                            data[pixelIdx] = 255; data[pixelIdx + 1] = 0; data[pixelIdx + 2] = 0; // Red Border
                        } else if (alpha > ALPHA_THRESHOLD) {
                            data[pixelIdx] = 255; // Red tint on actual mask
                            data[pixelIdx + 3] = 200; // Semi-transparent
                        }
                        continue;
                    }

                    if (alpha < ALPHA_THRESHOLD) continue;
                    alpha = Math.min(alpha, MAX_ALPHA);

                    const oneMinusAlpha = 1.0 - alpha;

                    for (let c = 0; c < 3; c++) {
                        const watermarkedVal = data[pixelIdx + c];
                        let originalVal = (watermarkedVal - (alpha * LOGO_VALUE)) / oneMinusAlpha;
                        originalVal = Math.max(0, Math.min(255, Math.round(originalVal)));
                        data[pixelIdx + c] = originalVal;
                    }
                }
            }
            return imageData;
        };

        const App = () => {
            const [mask48, setMask48] = useState(null);
            const [mask96, setMask96] = useState(null);
            const [sourceImage, setSourceImage] = useState(null);
            const [processedImage, setProcessedImage] = useState(null);
            
            // Configuration State
            const [isLargeMask, setIsLargeMask] = useState(true);
            const [marginX, setMarginX] = useState(64);
            const [marginY, setMarginY] = useState(64);
            const [debugMode, setDebugMode] = useState(false);
            
            const [fileName, setFileName] = useState("");
            const [error, setError] = useState("");

            useEffect(() => {
                const loadMasks = async () => {
                    try {
                        const loadImg = (url, size) => new Promise((resolve, reject) => {
                            const img = new Image();
                            img.crossOrigin = "Anonymous";
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                canvas.width = size;
                                canvas.height = size;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0);
                                resolve(calculateAlphaMap(ctx.getImageData(0, 0, size, size)));
                            };
                            img.onerror = () => reject();
                            img.src = url;
                        });

                        const [m48, m96] = await Promise.all([
                            loadImg('https://cdn.jsdelivr.net/gh/journey-ad/gemini-watermark-remover@main/src/assets/bg_48.png', 48),
                            loadImg('https://cdn.jsdelivr.net/gh/journey-ad/gemini-watermark-remover@main/src/assets/bg_96.png', 96)
                        ]);
                        setMask48(m48); setMask96(m96);
                    } catch (err) {
                        setError("Failed to load masks from GitHub.");
                    }
                };
                loadMasks();
            }, []);

            // The main processing function wrapped in useCallback so it updates when sliders move
            const processImage = useCallback(() => {
                if (!sourceImage || !mask48 || !mask96) return;

                const activeMask = isLargeMask ? mask96 : mask48;
                const wmSize = isLargeMask ? 96 : 48;

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                try {
                    const resultData = removeWatermark(ctx, sourceImage, activeMask, wmSize, marginX, marginY, debugMode);
                    ctx.putImageData(resultData, 0, 0);
                    setProcessedImage(canvas.toDataURL('image/png'));
                } catch (err) {
                    setError("Processing error.");
                }
            }, [sourceImage, mask48, mask96, isLargeMask, marginX, marginY, debugMode]);

            // Re-process automatically when settings change
            useEffect(() => {
                if (sourceImage) processImage();
            }, [processImage, sourceImage]);

            const handleDrop = (e) => {
                e.preventDefault();
                if (e.dataTransfer?.files?.length > 0) handleFile(e.dataTransfer.files[0]);
            };

            const handleFile = (file) => {
                if (!file.type.startsWith('image/')) {
                    setError("Please upload an image file.");
                    return;
                }
                setFileName(file.name);
                setError("");
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        // FIXED LOGIC: Checks if either dimension is >= 1024 (Supports landscape/portrait Gemini images)
                        const needsLarge = Math.max(img.width, img.height) >= 1024;
                        setIsLargeMask(needsLarge);
                        setMarginX(needsLarge ? 64 : 32);
                        setMarginY(needsLarge ? 64 : 32);
                        setSourceImage(img);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="glass-panel sticky top-0 z-50 w-full border-b border-white/5">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <span className="font-bold text-white text-lg">GIMG Pro</span>
                            </div>
                            <span className="text-xs bg-indigo-500/20 text-indigo-300 px-3 py-1 rounded-full border border-indigo-500/30">Calibration Mode</span>
                        </div>
                    </header>

                    <main className="flex-grow flex flex-col items-center justify-center p-4">
                        <div className="w-full max-w-6xl flex flex-col lg:flex-row gap-6">
                            
                            {/* Left Column: Image Area */}
                            <div className="flex-[2] glass-panel rounded-2xl p-4 flex flex-col min-h-[500px]">
                                {!sourceImage ? (
                                    <div 
                                        onDragOver={(e) => e.preventDefault()}
                                        onDrop={handleDrop}
                                        onClick={() => document.getElementById('fileUpload').click()}
                                        className="flex-1 drop-zone rounded-xl flex flex-col items-center justify-center cursor-pointer group"
                                    >
                                        <input id="fileUpload" type="file" className="hidden" accept="image/*" onChange={(e) => e.target.files.length && handleFile(e.target.files[0])} />
                                        <div className="w-16 h-16 bg-slate-800 rounded-2xl flex items-center justify-center text-slate-400 group-hover:text-indigo-400 group-hover:scale-110 transition-all mb-4">
                                            <Icons.Upload />
                                        </div>
                                        <p className="text-white font-medium">Upload Image to Calibrate</p>
                                    </div>
                                ) : (
                                    <div className="flex-1 flex flex-col">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="text-sm font-medium text-slate-300">Live Preview ({sourceImage.width}x{sourceImage.height})</h3>
                                            <div className="flex gap-2">
                                                <button onClick={() => setSourceImage(null)} className="px-3 py-1.5 bg-slate-800 rounded-lg text-sm text-slate-300 hover:text-white transition-colors flex items-center gap-2">
                                                    <Icons.Refresh /> Reset
                                                </button>
                                                <a href={processedImage} download={`clean_${fileName}`} className="px-4 py-1.5 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-medium text-white transition-colors flex items-center gap-2">
                                                    <Icons.Download /> Save Image
                                                </a>
                                            </div>
                                        </div>
                                        <div className="flex-1 relative checkerboard rounded-xl border border-slate-700 overflow-hidden flex items-center justify-center p-4">
                                            {processedImage && (
                                                <img src={processedImage} className="max-w-full max-h-[60vh] object-contain shadow-2xl" alt="Preview" />
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Right Column: Calibration Controls */}
                            <div className={`flex-1 glass-panel rounded-2xl p-6 transition-opacity duration-300 ${!sourceImage ? 'opacity-50 pointer-events-none' : 'opacity-100'}`}>
                                <div className="flex items-center gap-2 mb-6">
                                    <Icons.Settings />
                                    <h2 className="text-lg font-bold text-white">Calibration Tools</h2>
                                </div>

                                <p className="text-xs text-slate-400 mb-6">Google frequently changes watermark padding. Use these sliders to align the mask perfectly over the watermark.</p>

                                {/* Debug Toggle */}
                                <div className="mb-8 p-4 bg-slate-800/50 rounded-xl border border-slate-700">
                                    <label className="flex items-center justify-between cursor-pointer">
                                        <div className="flex items-center gap-2">
                                            <Icons.Eye />
                                            <span className="text-sm font-medium text-slate-200">Show Debug Mask</span>
                                        </div>
                                        <div className="relative">
                                            <input type="checkbox" className="sr-only" checked={debugMode} onChange={(e) => setDebugMode(e.target.checked)} />
                                            <div className={`block w-10 h-6 rounded-full transition-colors ${debugMode ? 'bg-indigo-500' : 'bg-slate-600'}`}></div>
                                            <div className={`absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform ${debugMode ? 'translate-x-4' : ''}`}></div>
                                        </div>
                                    </label>
                                    {debugMode && <p className="text-xs text-indigo-300 mt-2">Adjust sliders until the red box perfectly covers the watermark.</p>}
                                </div>

                                {/* Controls */}
                                <div className="space-y-6">
                                    <div>
                                        <div className="flex justify-between mb-2">
                                            <label className="text-sm text-slate-300">Right Margin (X Offset)</label>
                                            <span className="text-sm text-indigo-400 font-mono">{marginX}px</span>
                                        </div>
                                        <input type="range" min="0" max="150" value={marginX} onChange={(e) => setMarginX(Number(e.target.value))} className="w-full" />
                                    </div>

                                    <div>
                                        <div className="flex justify-between mb-2">
                                            <label className="text-sm text-slate-300">Bottom Margin (Y Offset)</label>
                                            <span className="text-sm text-indigo-400 font-mono">{marginY}px</span>
                                        </div>
                                        <input type="range" min="0" max="150" value={marginY} onChange={(e) => setMarginY(Number(e.target.value))} className="w-full" />
                                    </div>

                                    <div>
                                        <label className="text-sm text-slate-300 mb-2 block">Mask Size</label>
                                        <div className="flex bg-slate-800 rounded-lg p-1">
                                            <button onClick={() => setIsLargeMask(false)} className={`flex-1 py-2 rounded-md text-sm font-medium transition-all ${!isLargeMask ? 'bg-indigo-500 text-white' : 'text-slate-400 hover:text-white'}`}>Small (48px)</button>
                                            <button onClick={() => setIsLargeMask(true)} className={`flex-1 py-2 rounded-md text-sm font-medium transition-all ${isLargeMask ? 'bg-indigo-500 text-white' : 'text-slate-400 hover:text-white'}`}>Large (96px)</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {error && (
                            <div className="mt-4 bg-red-500/20 border border-red-500 text-red-200 px-4 py-2 rounded-lg text-sm">{error}</div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
