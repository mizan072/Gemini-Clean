<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIMG Cleaner v4.0 | Ultimate Suite</title>
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { cyber: { 500: '#0ea5e9', 600: '#0284c7', bg: '#020617', panel: '#0f172a' } }
                }
            }
        }
    </script>

    <style>
        body { background: #020617; color: #fff; overscroll-behavior: none; }
        html, body, #root { height: 100dvh; overflow: hidden; }
        
        .checkerboard {
            background-image: 
                linear-gradient(45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(-45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1e293b 75%), 
                linear-gradient(-45deg, transparent 75%, #1e293b 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        /* Selection Box for Manual Tool */
        .selection-box {
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
            border: 1px solid #0ea5e9;
            touch-action: none;
        }
        .handle {
            width: 24px; height: 24px;
            background: #0ea5e9;
            border: 2px solid white;
            border-radius: 50%;
            position: absolute;
            bottom: -12px; right: -12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- ICONS ---
        const Icons = {
            Auto: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>,
            Manual: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>,
            Save: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
            Upload: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Undo: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/></svg>,
            Erase: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
        };

        // --- MATH ENGINE (AUTO REMOVER) ---
        const calculateAlphaMap = (imgData) => {
            const { width, height, data } = imgData;
            const alphaMap = new Float32Array(width * height);
            for (let i = 0; i < alphaMap.length; i++) {
                const idx = i * 4;
                const val = Math.max(data[idx], data[idx + 1], data[idx + 2]);
                alphaMap[i] = val / 255.0;
            }
            return alphaMap;
        };

        const processAuto = (ctx, img, alphaMap, isLarge, strength, offX, offY) => {
            const w = img.width, h = img.height;
            ctx.canvas.width = w; ctx.canvas.height = h;
            ctx.drawImage(img, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, w, h);
            const data = imageData.data;
            const size = isLarge ? 96 : 48;
            const margin = isLarge ? 64 : 32;
            const startX = (w - size - margin) + offX;
            const startY = (h - size - margin) + offY;

            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const gx = startX + c, gy = startY + r;
                    if (gx >= w || gy >= h || gx < 0 || gy < 0) continue;
                    
                    const pIdx = (gy * w + gx) * 4;
                    const mIdx = r * size + c;
                    let alpha = alphaMap[mIdx] * strength;
                    if (alpha < 0.005) continue;
                    alpha = Math.min(alpha, 0.99);

                    for (let k = 0; k < 3; k++) {
                        let val = (data[pIdx+k] - (alpha * 255)) / (1 - alpha);
                        data[pIdx+k] = Math.max(0, Math.min(255, Math.round(val)));
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0);
        };

        // --- MANUAL ERASER LOGIC ---
        const processManual = (canvas, rectPercent, mode) => {
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;
            
            const rx = (rectPercent.x/100)*w; 
            const ry = (rectPercent.y/100)*h;
            const rw = (rectPercent.w/100)*w; 
            const rh = (rectPercent.h/100)*h;

            if (mode === 'cloneLeft') {
                // Take a sliver from left and repeat it
                const sliceW = 2;
                const srcX = Math.max(0, rx - sliceW);
                for(let i=0; i<rw; i+=sliceW) {
                    ctx.drawImage(canvas, srcX, ry, sliceW, rh, rx+i, ry, sliceW, rh);
                }
            } else if (mode === 'blur') {
                // Box blur simulation
                const temp = document.createElement('canvas');
                temp.width = rw; temp.height = rh;
                const tCtx = temp.getContext('2d');
                tCtx.filter = 'blur(8px)';
                tCtx.drawImage(canvas, rx, ry, rw, rh, 0, 0, rw, rh);
                ctx.drawImage(temp, rx, ry);
            }
        };

        // --- APP COMPONENT ---
        const App = () => {
            const [masks, setMasks] = useState({ small: null, large: null });
            const [file, setFile] = useState(null);
            const [baseImg, setBaseImg] = useState(null); // The original uploaded image
            const [currentImg, setCurrentImg] = useState(null); // The current state (after edits)
            const [history, setHistory] = useState([]); // For Undo
            
            const [mode, setMode] = useState('auto'); // 'auto', 'manual'
            
            // Auto Settings
            const [autoStrength, setAutoStrength] = useState(1.0);
            const [autoOff, setAutoOff] = useState({ x: 0, y: 0 });
            
            // Manual Settings
            const [manualSel, setManualSel] = useState({ x: 40, y: 80, w: 20, h: 10 });
            const [manualTool, setManualTool] = useState('cloneLeft');
            const canvasRef = useRef(null);
            const dragRef = useRef(null);

            // Load Resources
            useEffect(() => {
                const load = (url, s) => new Promise(r => {
                    const i = new Image(); i.crossOrigin="Anonymous";
                    i.onload = () => {
                        const c = document.createElement('canvas'); c.width=s; c.height=s;
                        c.getContext('2d').drawImage(i,0,0);
                        r(calculateAlphaMap(c.getContext('2d').getImageData(0,0,s,s)));
                    };
                    i.src = url;
                });
                Promise.all([
                    load('https://cdn.jsdelivr.net/gh/journey-ad/gemini-watermark-remover@main/src/assets/bg_48.png', 48),
                    load('https://cdn.jsdelivr.net/gh/journey-ad/gemini-watermark-remover@main/src/assets/bg_96.png', 96)
                ]).then(([s, l]) => setMasks({ small: s, large: l }));
            }, []);

            // Handle Image Upload
            const handleUpload = (f) => {
                if(!f) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        setFile(f);
                        setBaseImg(img);
                        setCurrentImg(img); // Start with clean slate
                        setHistory([]); // Reset undo
                        // Auto-run cleaner first? No, let user choose.
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(f);
            };

            // Run Auto Cleaner
            const runAuto = () => {
                if (!currentImg || !masks.small) return;
                const cvs = document.createElement('canvas');
                const ctx = cvs.getContext('2d');
                const isLarge = currentImg.width > 1024 && currentImg.height > 1024;
                
                processAuto(ctx, currentImg, isLarge ? masks.large : masks.small, isLarge, autoStrength, autoOff.x, autoOff.y);
                
                const newImg = new Image();
                newImg.onload = () => {
                    addToHistory();
                    setCurrentImg(newImg);
                };
                newImg.src = cvs.toDataURL();
            };

            // Run Manual Eraser
            const runManual = () => {
                const cvs = canvasRef.current;
                if(!cvs) return;
                
                // Process directly on canvas content
                processManual(cvs, manualSel, manualTool);
                
                const newImg = new Image();
                newImg.onload = () => {
                    addToHistory();
                    setCurrentImg(newImg);
                };
                newImg.src = cvs.toDataURL();
            };

            const addToHistory = () => {
                if (currentImg) setHistory(prev => [...prev.slice(-4), currentImg]);
            };

            const undo = () => {
                if (history.length === 0) return;
                const prev = history[history.length - 1];
                setCurrentImg(prev);
                setHistory(h => h.slice(0, -1));
            };

            // Manual Selection Interaction
            const updateSel = (cx, cy) => {
                if (!dragRef.current || !canvasRef.current) return;
                const r = canvasRef.current.getBoundingClientRect();
                const px = ((cx - r.left)/r.width)*100;
                const py = ((cy - r.top)/r.height)*100;
                
                setManualSel(prev => {
                    if (dragRef.current === 'move') return { ...prev, x: px - prev.w/2, y: py - prev.h/2 };
                    if (dragRef.current === 'size') return { ...prev, w: Math.max(1, px - prev.x), h: Math.max(1, py - prev.y) };
                    return prev;
                });
            };

            // Canvas Render (for Manual Mode)
            useEffect(() => {
                if (mode === 'manual' && currentImg && canvasRef.current) {
                    const cvs = canvasRef.current;
                    const ctx = cvs.getContext('2d');
                    cvs.width = currentImg.width;
                    cvs.height = currentImg.height;
                    ctx.drawImage(currentImg, 0, 0);
                }
            }, [mode, currentImg]);

            // --- RENDER ---
            return (
                <div className="flex flex-col h-full bg-cyber-bg text-slate-200">
                    
                    {/* Header */}
                    <header className="h-14 bg-cyber-panel border-b border-slate-800 flex items-center justify-between px-4 shrink-0 z-50">
                        <div className="flex items-center gap-2 font-bold text-white">
                            <div className="w-6 h-6 bg-cyber-600 rounded flex items-center justify-center text-xs">G</div>
                            <span>Cleaner <span className="text-cyber-500">v4.0</span></span>
                        </div>
                        {currentImg && (
                            <div className="flex bg-slate-800 rounded-lg p-1 gap-1">
                                <button onClick={()=>setMode('auto')} className={`px-3 py-1 text-xs rounded transition-colors ${mode==='auto' ? 'bg-cyber-600 text-white' : 'text-slate-400'}`}>Auto Clean</button>
                                <button onClick={()=>setMode('manual')} className={`px-3 py-1 text-xs rounded transition-colors ${mode==='manual' ? 'bg-cyber-600 text-white' : 'text-slate-400'}`}>Manual Tools</button>
                            </div>
                        )}
                        {history.length > 0 && (
                            <button onClick={undo} className="text-slate-400 hover:text-white"><Icons.Undo/></button>
                        )}
                    </header>

                    {/* Main Area */}
                    <main className="flex-1 flex flex-col md:flex-row overflow-hidden relative">
                        
                        {/* LEFT: Canvas */}
                        <div className="flex-1 bg-black relative flex flex-col order-1 md:order-2 overflow-hidden">
                            {!currentImg ? (
                                <div className="absolute inset-0 flex items-center justify-center p-6 checkerboard">
                                    <label className="flex flex-col items-center justify-center w-full max-w-sm aspect-square border-2 border-dashed border-slate-700 rounded-2xl bg-slate-900/80 cursor-pointer hover:border-cyber-500 transition-colors">
                                        <input type="file" className="hidden" accept="image/*" onChange={(e)=>handleUpload(e.target.files[0])} />
                                        <div className="text-cyber-500 mb-4 scale-150"><Icons.Upload/></div>
                                        <span className="font-bold">Upload Image</span>
                                    </label>
                                </div>
                            ) : (
                                <div className="flex-1 relative flex items-center justify-center bg-[#111] overflow-hidden touch-none"
                                     onMouseMove={(e)=>updateSel(e.clientX, e.clientY)}
                                     onTouchMove={(e)=>updateSel(e.touches[0].clientX, e.touches[0].clientY)}
                                     onMouseUp={()=>dragRef.current=null}
                                     onTouchEnd={()=>dragRef.current=null}
                                >
                                    {mode === 'auto' ? (
                                        <img src={currentImg.src} className="max-w-full max-h-full object-contain shadow-2xl" />
                                    ) : (
                                        <div className="relative shadow-2xl">
                                            <canvas ref={canvasRef} className="max-w-full max-h-[80vh] block" />
                                            {/* Selection Overlay */}
                                            <div className="absolute selection-box cursor-move"
                                                 style={{ left: `${manualSel.x}%`, top: `${manualSel.y}%`, width: `${manualSel.w}%`, height: `${manualSel.h}%` }}
                                                 onMouseDown={()=>dragRef.current='move'}
                                                 onTouchStart={()=>dragRef.current='move'}
                                            >
                                                <div className="handle cursor-nwse-resize"
                                                     onMouseDown={(e)=>{e.stopPropagation(); dragRef.current='size'}}
                                                     onTouchStart={(e)=>{e.stopPropagation(); dragRef.current='size'}}
                                                />
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* RIGHT: Tools Panel */}
                        {currentImg && (
                            <div className="w-full md:w-80 bg-cyber-panel border-t md:border-t-0 md:border-l border-slate-800 order-2 md:order-3 z-20 shrink-0 h-[40vh] md:h-auto overflow-y-auto">
                                
                                {/* AUTO MODE CONTROLS */}
                                {mode === 'auto' && (
                                    <div className="p-6 space-y-6">
                                        <div className="text-xs font-bold text-cyber-500 uppercase tracking-widest mb-4">Gemini Auto-Clean</div>
                                        
                                        <div>
                                            <label className="text-xs text-slate-400 block mb-1">Alignment X (Horizontal)</label>
                                            <input type="range" min="-50" max="50" value={autoOff.x} onChange={e=>setAutoOff({...autoOff, x: +e.target.value})} className="w-full h-1 bg-slate-600 rounded" />
                                        </div>
                                        <div>
                                            <label className="text-xs text-slate-400 block mb-1">Alignment Y (Vertical)</label>
                                            <input type="range" min="-50" max="50" value={autoOff.y} onChange={e=>setAutoOff({...autoOff, y: +e.target.value})} className="w-full h-1 bg-slate-600 rounded" />
                                        </div>
                                        <div>
                                            <label className="text-xs text-slate-400 block mb-1">Strength: {autoStrength}x</label>
                                            <input type="range" min="0.5" max="1.5" step="0.1" value={autoStrength} onChange={e=>setAutoStrength(+e.target.value)} className="w-full h-1 bg-slate-600 rounded" />
                                        </div>

                                        <button onClick={runAuto} className="w-full py-3 bg-cyber-600 hover:bg-cyber-500 text-white rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-cyber-500/20">
                                            <Icons.Auto /> Apply Auto Clean
                                        </button>
                                        <p className="text-[10px] text-slate-500 text-center">Use sliders if you see ghosting/doubling.</p>
                                    </div>
                                )}

                                {/* MANUAL MODE CONTROLS */}
                                {mode === 'manual' && (
                                    <div className="p-6 space-y-6">
                                        <div className="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-4">Manual Eraser</div>
                                        
                                        <div className="grid grid-cols-2 gap-2">
                                            <button onClick={()=>setManualTool('cloneLeft')} className={`p-3 rounded-lg border text-xs font-bold ${manualTool==='cloneLeft' ? 'bg-emerald-500/20 border-emerald-500 text-emerald-400' : 'border-slate-700 text-slate-400'}`}>
                                                ⬅️ Clone Left
                                            </button>
                                            <button onClick={()=>setManualTool('blur')} className={`p-3 rounded-lg border text-xs font-bold ${manualTool==='blur' ? 'bg-emerald-500/20 border-emerald-500 text-emerald-400' : 'border-slate-700 text-slate-400'}`}>
                                                💧 Blur
                                            </button>
                                        </div>
                                        
                                        <div className="text-[10px] text-slate-400 leading-relaxed bg-slate-800/50 p-3 rounded">
                                            <strong>How to remove footer:</strong><br/>
                                            1. Drag the blue box over the footer logo.<br/>
                                            2. Select "Clone Left".<br/>
                                            3. Click Erase. This copies the clean background from the left over the logo.
                                        </div>

                                        <button onClick={runManual} className="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-emerald-500/20">
                                            <Icons.Erase /> Erase Selected Area
                                        </button>
                                    </div>
                                )}

                                {/* DOWNLOAD */}
                                <div className="p-6 pt-0 mt-auto border-t border-slate-800/50">
                                    <button onClick={()=>{
                                        const a = document.createElement('a');
                                        a.download = 'cleaned_image.png';
                                        a.href = currentImg.src;
                                        a.click();
                                    }} className="w-full mt-6 py-3 bg-white text-black hover:bg-slate-200 rounded-xl font-bold flex items-center justify-center gap-2">
                                        <Icons.Save /> Save Result
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
