<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GIMG Auto Cleaner | 1-Click Image Restoration</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0f1115;
            --bg-panel: #16181d;
            --bg-elevated: #1e2128;
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-primary: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.2);
        }

        html, body {
            height: 100%;
            overscroll-behavior-y: none;
            background-color: var(--bg-base);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        .checkerboard {
            background-color: #0b0c0f;
            background-image: 
                linear-gradient(45deg, #16181d 25%, transparent 25%), 
                linear-gradient(-45deg, #16181d 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #16181d 75%), 
                linear-gradient(-45deg, transparent 75%, #16181d 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .slider-container {
            position: relative;
            width: 100%;
            height: 32px; 
            display: flex;
            align-items: center;
        }
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            position: absolute;
            z-index: 2;
            margin: 0;
            cursor: pointer;
            touch-action: none; 
        }
        input[type=range]:focus { outline: none; }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px; width: 24px; 
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 0 0 2px var(--bg-panel);
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: -10px; 
        }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.15); }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 6px;
            background: #2e333d;
            border-radius: 3px;
        }

        .dropzone { transition: all 0.2s ease-in-out; }
        .dropzone:hover, .dropzone.active {
            border-color: var(--accent-primary);
            background-color: var(--accent-glow);
        }

        .safe-pb { padding-bottom: env(safe-area-inset-bottom, 20px); }
    </style>
</head>
<body>
    <div id="root" class="flex flex-col min-h-screen"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const Icons = {
            Logo: () => (
                <svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="32" height="32" rx="8" fill="url(#paint0_linear)"/>
                    <path d="M11 16L15 20L22 12" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
                    <defs>
                        <linearGradient id="paint0_linear" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                            <stop stopColor="#6366F1"/>
                            <stop offset="1" stopColor="#A855F7"/>
                        </linearGradient>
                    </defs>
                </svg>
            ),
            Upload: () => (
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M14 30L24 20L34 30" stroke="#38BDF8" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"/>
                    <path d="M24 20V40" stroke="#38BDF8" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"/>
                    <path d="M38 32C41.3137 32 44 29.3137 44 26C44 22.9566 41.7335 20.4429 38.8093 20.063C38.2711 14.4093 33.5135 10 27.75 10C23.0125 10 18.9818 12.9806 17.1593 17.1264C16.8041 17.0435 16.4326 17 16.05 17C11.6041 17 8 20.5817 8 25C8 28.8659 10.7397 32.0886 14.4239 32.8468" stroke="#818CF8" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
            ),
            Download: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 15V3M12 15L8 11M12 15L16 11" stroke="#10B981" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                    <path d="M2 17L2.621 19.485C2.72915 19.9177 2.97882 20.3018 3.324 20.5693C3.66919 20.8368 4.08697 20.9715 4.519 20.95H19.481C19.913 20.9715 20.3308 20.8368 20.676 20.5693C21.0212 20.3018 21.2708 19.9177 21.379 19.485L22 17" stroke="#34D399" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
            ),
            CheckCircle: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="#10B981" strokeWidth="2"/>
                    <path d="M8 12L11 15L16 9" stroke="#10B981" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
            ),
            Settings: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                    <circle cx="12" cy="12" r="3" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
            )
        };

        const ProSlider = ({ label, value, min, max, onChange, unit = "px", color = "#6366f1" }) => {
            const percentage = ((value - min) / (max - min)) * 100;
            return (
                <div className="flex flex-col gap-2">
                    <div className="flex justify-between items-center">
                        <label className="text-sm font-semibold text-slate-300">{label}</label>
                        <div className="bg-[#1e2128] border border-white/5 rounded pl-2 pr-1 py-1 flex items-center gap-1 shadow-inner">
                            <span className="text-xs font-mono text-white min-w-[3ch] text-right">{value}</span>
                            <span className="text-[10px] text-slate-500">{unit}</span>
                        </div>
                    </div>
                    <div className="slider-container">
                        <div 
                            className="absolute h-1.5 rounded-full pointer-events-none" 
                            style={{ width: `${percentage}%`, backgroundColor: color, zIndex: 1 }}
                        />
                        <input 
                            type="range" 
                            min={min} 
                            max={max} 
                            value={value} 
                            onInput={(e) => onChange(Number(e.target.value))}
                            onChange={(e) => onChange(Number(e.target.value))}
                        />
                    </div>
                </div>
            );
        };

        const calculateAlphaMap = (imgData) => {
            const { width, height, data } = imgData;
            const alphaMap = new Float32Array(width * height);
            for (let i = 0; i < alphaMap.length; i++) {
                const val = Math.max(data[i*4], data[i*4+1], data[i*4+2]);
                alphaMap[i] = val / 255.0;
            }
            return alphaMap;
        };

        const applyAlphaMath = (data, width, height, startX, startY, wmSize, alphaMap) => {
            const LOGO_VALUE = 255;
            for (let row = 0; row < wmSize; row++) {
                for (let col = 0; col < wmSize; col++) {
                    const x = startX + col; const y = startY + row;
                    if (x >= width || y >= height || x < 0 || y < 0) continue;

                    let alpha = alphaMap[row * wmSize + col];
                    if (alpha < 0.002) continue;
                    alpha = Math.min(alpha, 0.99); // Prevent background color destruction

                    const idx = (y * width + x) * 4;
                    for (let c = 0; c < 3; c++) {
                        let originalVal = (data[idx + c] - (alpha * LOGO_VALUE)) / (1.0 - alpha);
                        data[idx + c] = Math.max(0, Math.min(255, Math.round(originalVal)));
                    }
                }
            }
        };

        const App = () => {
            const [sourceImage, setSourceImage] = useState(null);
            const [processedImage, setProcessedImage] = useState(null);
            const [fileName, setFileName] = useState("");
            
            // Auto Settings
            const [marginX, setMarginX] = useState(32);
            const [marginY, setMarginY] = useState(32);
            const [showAdvanced, setShowAdvanced] = useState(false);
            
            const [legacyMasks, setLegacyMasks] = useState({ m48: null, m96: null });
            const [isDragging, setIsDragging] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            
            const renderId = useRef(0);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const loadMasks = async () => {
                    const loadImg = (repo, size) => new Promise((resolve) => {
                        const img = new Image();
                        img.crossOrigin = "Anonymous";
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            canvas.width = size; canvas.height = size;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0);
                            resolve(calculateAlphaMap(ctx.getImageData(0, 0, size, size)));
                        };
                        img.onerror = () => resolve(null);
                        img.src = `https://cdn.jsdelivr.net/gh/${repo}/gemini-watermark-remover@main/src/assets/bg_${size}.png`;
                    });

                    let m48 = await loadImg('GargantuaX', 48);
                    if (!m48) m48 = await loadImg('journey-ad', 48);
                    
                    let m96 = await loadImg('GargantuaX', 96);
                    if (!m96) m96 = await loadImg('journey-ad', 96);

                    setLegacyMasks({ m48, m96 });
                };
                loadMasks();
            }, []);

            const processImage = useCallback(() => {
                if (!sourceImage) return;

                const currentRender = ++renderId.current;
                const canvas = document.createElement('canvas');
                canvas.width = sourceImage.width;
                canvas.height = sourceImage.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(sourceImage, 0, 0);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                // Fully Automatic Size Detection
                const isHuge = Math.max(sourceImage.width, sourceImage.height) >= 1024;
                const actualBoxSize = isHuge ? 96 : 48;
                const mask = isHuge ? legacyMasks.m96 : legacyMasks.m48;

                const startX = canvas.width - actualBoxSize - marginX;
                const startY = canvas.height - actualBoxSize - marginY;

                if (mask) {
                    applyAlphaMath(data, canvas.width, canvas.height, startX, startY, actualBoxSize, mask);
                }

                ctx.putImageData(imageData, 0, 0);

                canvas.toBlob((blob) => {
                    if (currentRender !== renderId.current) return; 
                    const url = URL.createObjectURL(blob);
                    setProcessedImage(prev => {
                        if (prev) URL.revokeObjectURL(prev); 
                        return url;
                    });
                    setIsProcessing(false);
                }, 'image/png');

            }, [sourceImage, marginX, marginY, legacyMasks]);

            useEffect(() => {
                if (sourceImage) {
                    setIsProcessing(true);
                    const timeoutId = setTimeout(() => {
                        processImage();
                    }, 50);
                    return () => clearTimeout(timeoutId);
                }
            }, [processImage, sourceImage]);

            const handleFile = (file) => {
                setIsDragging(false);
                if (!file || !file.type.startsWith('image/')) return;
                setFileName(file.name);
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        // Fully Automatic Default Margins
                        const isHuge = Math.max(img.width, img.height) >= 1024;
                        setMarginX(isHuge ? 64 : 32);
                        setMarginY(isHuge ? 64 : 32);
                        setShowAdvanced(false); // Hide manual controls on new upload
                        setSourceImage(img);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            };

            const resetState = () => {
                setSourceImage(null);
                if (processedImage) URL.revokeObjectURL(processedImage);
                setProcessedImage(null);
            };

            const handleExport = async () => {
                if (!processedImage) return;
                
                const safeFileName = fileName ? fileName.replace(/\.[^/.]+$/, "") : "image";
                const finalName = `clean_${safeFileName}.png`;

                if (navigator.share && /mobile|android|iphone|ipad|ipod/i.test(navigator.userAgent || navigator.vendor || window.opera)) {
                    try {
                        const response = await fetch(processedImage);
                        const blob = await response.blob();
                        const file = new File([blob], finalName, { type: blob.type || 'image/png' });
                        
                        if (navigator.canShare && navigator.canShare({ files: [file] })) {
                            await navigator.share({
                                files: [file],
                                title: 'Cleaned Image',
                            });
                            return; 
                        }
                    } catch (err) {
                        console.log("Share API fallback", err);
                    }
                }
                
                const link = document.createElement('a');
                link.href = processedImage;
                link.download = finalName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="flex flex-col h-[100dvh] overflow-hidden bg-black lg:bg-[#0f1115]">
                    {/* Header */}
                    <header className="h-14 shrink-0 bg-[#0f1115] border-b border-white/5 flex items-center justify-between px-4 lg:px-6 z-10">
                        <div className="flex items-center gap-3">
                            <Icons.Logo />
                            <span className="font-bold text-slate-100 text-sm tracking-wide hidden sm:block">GIMG Auto Cleaner</span>
                        </div>
                        <div className="flex items-center gap-3 bg-[#16181d] border border-white/5 rounded-full px-3 py-1">
                            <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                            <span className="text-xs font-medium text-slate-300">Ready</span>
                        </div>
                    </header>

                    <main className="flex-1 flex flex-col lg:flex-row overflow-hidden relative">
                        {/* LEFT/TOP: Canvas Area */}
                        <div className="flex-1 flex flex-col relative bg-[#0b0c0f] min-h-[40vh] lg:min-h-0">
                            {!sourceImage ? (
                                <div className="absolute inset-0 flex items-center justify-center p-4 lg:p-12">
                                    <div 
                                        onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
                                        onDragLeave={() => setIsDragging(false)}
                                        onDrop={(e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); }}
                                        onClick={() => fileInputRef.current && fileInputRef.current.click()}
                                        className={`w-full max-w-2xl aspect-[4/3] lg:aspect-video rounded-3xl border-2 border-dashed flex flex-col items-center justify-center cursor-pointer transition-all duration-300 dropzone ${isDragging ? 'border-indigo-500 bg-indigo-500/10 scale-[1.02]' : 'border-white/10 bg-[#16181d]/50 hover:bg-[#16181d]'}`}
                                    >
                                        <input ref={fileInputRef} type="file" className="hidden" accept="image/*" onChange={(e) => handleFile(e.target.files[0])} />
                                        <div className="mb-4 lg:mb-6 transform transition-transform group-hover:-translate-y-2">
                                            <Icons.Upload />
                                        </div>
                                        <h2 className="text-lg lg:text-xl font-bold text-white mb-2">Select Image</h2>
                                        <p className="text-slate-400 text-xs lg:text-sm">1-Click Auto Watermark Removal</p>
                                    </div>
                                </div>
                            ) : (
                                <div className="absolute inset-0 flex flex-col">
                                    <div className="h-12 bg-[#16181d]/90 backdrop-blur border-b border-white/5 flex items-center justify-between px-3 lg:px-4 shrink-0 absolute top-0 w-full z-10">
                                        <div className="flex items-center gap-2 lg:gap-3 overflow-hidden">
                                            <span className="text-[10px] lg:text-xs font-mono text-indigo-300 bg-indigo-500/10 border border-indigo-500/20 px-2 py-1 rounded shrink-0">
                                                {sourceImage.width}×{sourceImage.height}
                                            </span>
                                            <span className="text-[11px] lg:text-xs text-slate-400 truncate w-24 sm:w-auto">{fileName}</span>
                                        </div>
                                        <div className="flex items-center gap-2 shrink-0">
                                            <button onClick={resetState} className="px-3 py-1.5 text-xs font-medium text-slate-400 hover:text-white bg-white/5 hover:bg-white/10 rounded-lg transition-colors">
                                                Close
                                            </button>
                                            <button onClick={handleExport} disabled={isProcessing} className="px-3 lg:px-4 py-1.5 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white rounded-lg text-xs font-semibold shadow-lg shadow-indigo-500/20 transition-all flex items-center gap-2">
                                                <span className="hidden sm:inline">Export</span>
                                                <Icons.Download />
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <div className="flex-1 checkerboard relative overflow-auto flex items-center justify-center p-4 pt-16 flex-col">
                                        {processedImage && (
                                            <img 
                                                src={processedImage} 
                                                alt="Preview" 
                                                className={`max-w-full max-h-[65vh] object-contain shadow-2xl rounded ring-1 ring-white/10 mb-2 transition-opacity duration-300 ${isProcessing ? 'opacity-50 blur-sm' : 'opacity-100'}`} 
                                                style={{ WebkitTouchCallout: 'default' }} 
                                            />
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* RIGHT/BOTTOM: Inspector Panel */}
                        <div className={`w-full lg:w-[320px] lg:shrink-0 bg-[#16181d] border-t lg:border-t-0 lg:border-l border-white/5 flex flex-col transition-opacity duration-300 z-20 ${!sourceImage ? 'opacity-40 pointer-events-none' : 'opacity-100'} h-[30vh] lg:h-auto overflow-y-auto safe-pb`}>
                            
                            <div className="p-5 lg:p-6 space-y-6">
                                
                                {/* Status Card */}
                                <div className="bg-emerald-500/10 border border-emerald-500/20 rounded-2xl p-4 flex flex-col items-center text-center gap-3">
                                    <Icons.CheckCircle />
                                    <div>
                                        <h3 className="text-emerald-400 font-bold text-sm mb-1">Watermark Removed</h3>
                                        <p className="text-xs text-emerald-500/80 leading-snug">Original background pixels have been 100% restored.</p>
                                    </div>
                                </div>

                                {/* Advanced Calibration Toggle */}
                                <div className="pt-4 border-t border-white/5">
                                    <button 
                                        onClick={() => setShowAdvanced(!showAdvanced)}
                                        className="w-full flex items-center justify-between text-slate-400 hover:text-white transition-colors py-2"
                                    >
                                        <div className="flex items-center gap-2">
                                            <Icons.Settings />
                                            <span className="text-xs font-semibold">Fine-tune Position</span>
                                        </div>
                                        <span className="text-xs">{showAdvanced ? '−' : '+'}</span>
                                    </button>
                                    
                                    {showAdvanced && (
                                        <div className="mt-4 space-y-6 bg-black/20 p-4 rounded-xl border border-white/5 animate-in fade-in slide-in-from-top-2">
                                            <p className="text-[10px] text-slate-500 leading-tight mb-4">
                                                If Google slightly shifts the watermark, use these sliders to realign the invisible removal mask.
                                            </p>
                                            <ProSlider label="X Offset (Right)" value={marginX} min={0} max={150} onChange={setMarginX} color="#6366f1" />
                                            <ProSlider label="Y Offset (Bottom)" value={marginY} min={0} max={150} onChange={setMarginY} color="#6366f1" />
                                        </div>
                                    )}
                                </div>

                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
