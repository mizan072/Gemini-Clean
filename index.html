<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIMG Cleaner v2.1 | Mobile Responsive</title>
    
    <!-- Core Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        cyber: {
                            500: '#0ea5e9', // Sky blue
                            600: '#0284c7',
                            accent: '#f43f5e', // Rose
                            dark: '#020617', // Slate 950
                            panel: '#0f172a', // Slate 900
                        }
                    },
                    animation: {
                        'scan': 'scan 2s linear infinite',
                    },
                    keyframes: {
                        scan: {
                            '0%': { transform: 'translateY(-100%)', opacity: '0' },
                            '50%': { opacity: '1' },
                            '100%': { transform: 'translateY(100%)', opacity: '0' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            overscroll-behavior: none;
        }
        
        /* Mobile-friendly sizing */
        html, body, #root {
            height: 100%;
            height: 100dvh; /* Dynamic viewport height for mobile */
            overflow: hidden;
        }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .checkerboard {
            background-color: #1e293b;
            background-image: 
                linear-gradient(45deg, #0f172a 25%, transparent 25%), 
                linear-gradient(-45deg, #0f172a 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #0f172a 75%), 
                linear-gradient(-45deg, transparent 75%, #0f172a 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .slider-handle {
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.2);
        }

        /* Range Input Styling */
        input[type="range"] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #f8fafc;
            margin-top: -6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: #334155;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- ICONS ---
        const Icons = {
            Upload: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Download: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Refresh: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>,
            ZoomIn: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>,
            ZoomOut: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>,
            Compare: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M12 3v18"/></svg>,
            Settings: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
            Move: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="19 9 22 12 19 15"/><polyline points="9 19 12 22 15 19"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>,
        };

        // --- CORE MATH ---
        const calculateAlphaMap = (imgData) => {
            const { width, height, data } = imgData;
            const alphaMap = new Float32Array(width * height);
            for (let i = 0; i < alphaMap.length; i++) {
                const idx = i * 4;
                const val = Math.max(data[idx], data[idx + 1], data[idx + 2]);
                alphaMap[i] = val / 255.0;
            }
            return alphaMap;
        };

        const processImage = (ctx, originalImg, alphaMap, isLarge, strength, offsetX, offsetY) => {
            const width = originalImg.width;
            const height = originalImg.height;
            
            ctx.canvas.width = width;
            ctx.canvas.height = height;
            ctx.drawImage(originalImg, 0, 0);

            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;

            const wmSize = isLarge ? 96 : 48;
            const margin = isLarge ? 64 : 32;
            
            // Manual Offset Applied Here!
            const startX = (width - wmSize - margin) + offsetX;
            const startY = (height - wmSize - margin) + offsetY;

            const LOGO_VALUE = 255;
            const MAX_ALPHA = 0.99;

            for (let row = 0; row < wmSize; row++) {
                for (let col = 0; col < wmSize; col++) {
                    const globalX = startX + col;
                    const globalY = startY + row;

                    if (globalX >= width || globalY >= height || globalX < 0 || globalY < 0) continue;

                    const pixelIdx = (globalY * width + globalX) * 4;
                    const maskIdx = row * wmSize + col;
                    
                    let alpha = alphaMap[maskIdx];
                    alpha = alpha * strength;

                    if (alpha < 0.005) continue; 
                    alpha = Math.min(alpha, MAX_ALPHA);

                    const oneMinusAlpha = 1.0 - alpha;

                    for (let c = 0; c < 3; c++) {
                        const watermarkedVal = data[pixelIdx + c];
                        let originalVal = (watermarkedVal - (alpha * LOGO_VALUE)) / oneMinusAlpha;
                        originalVal = Math.max(0, Math.min(255, Math.round(originalVal)));
                        data[pixelIdx + c] = originalVal;
                    }
                }
            }
            return imageData;
        };

        const CompareSlider = ({ originalSrc, processedSrc, zoom, pan, dimensions }) => {
            const [sliderPos, setSliderPos] = useState(50);
            const containerRef = useRef(null);
            const isDragging = useRef(false);

            const handleMove = useCallback((e) => {
                if (!isDragging.current || !containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                const x = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                const pos = ((x - rect.left) / rect.width) * 100;
                setSliderPos(Math.min(100, Math.max(0, pos)));
            }, []);

            return (
                <div 
                    ref={containerRef}
                    className="relative w-full h-full overflow-hidden select-none touch-none"
                    onMouseDown={() => isDragging.current = true}
                    onTouchStart={() => isDragging.current = true}
                    onMouseUp={() => isDragging.current = false}
                    onTouchEnd={() => isDragging.current = false}
                    onMouseMove={handleMove}
                    onTouchMove={handleMove}
                >
                    <div 
                        className="absolute origin-center transition-transform duration-75 ease-out will-change-transform"
                        style={{
                            width: '100%',
                            height: '100%',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`
                        }}
                    >
                        <div className="relative shadow-2xl bg-black" style={{
                            width: dimensions.w ? `${dimensions.w}px` : 'auto',
                            height: dimensions.h ? `${dimensions.h}px` : 'auto',
                            maxWidth: '100%',
                            maxHeight: '100%'
                        }}>
                            {/* Layer 1: Processed Image (Background) */}
                            <img src={processedSrc} className="absolute inset-0 w-full h-full object-contain pointer-events-none" draggable="false" />

                            {/* Layer 2: Original Image (Foreground, Clipped) */}
                            <div className="absolute inset-0 overflow-hidden pointer-events-none" style={{ width: `${sliderPos}%` }}>
                                <img src={originalSrc} className="absolute inset-0 max-w-none h-full w-full object-contain" draggable="false" />
                                <div className="absolute top-4 left-4 bg-black/60 backdrop-blur text-white text-[10px] px-2 py-1 rounded font-mono border border-white/10">ORIGINAL</div>
                            </div>
                             <div className="absolute top-4 right-4 bg-cyber-500/20 backdrop-blur text-cyber-500 text-[10px] px-2 py-1 rounded font-mono border border-cyber-500/30">CLEANED</div>

                            {/* Handle */}
                            <div className="absolute top-0 bottom-0 w-0.5 bg-white cursor-col-resize z-10" style={{ left: `${sliderPos}%` }}>
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 bg-cyber-500 rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(14,165,233,0.5)] slider-handle">
                                    <Icons.Compare />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [mask48, setMask48] = useState(null);
            const [mask96, setMask96] = useState(null);
            
            const [originalFile, setOriginalFile] = useState(null);
            const [originalImageSrc, setOriginalImageSrc] = useState(null);
            const [processedImageSrc, setProcessedImageSrc] = useState(null);
            
            const [isProcessing, setIsProcessing] = useState(false);
            const [isLoadingResources, setIsLoadingResources] = useState(true);
            
            // --- EDITING STATE ---
            const [strength, setStrength] = useState(1.0);
            const [zoom, setZoom] = useState(1);
            const [pan, setPan] = useState({ x: 0, y: 0 });
            const [offsetX, setOffsetX] = useState(0);
            const [offsetY, setOffsetY] = useState(0);
            const [forceMask, setForceMask] = useState('auto'); // 'auto', 'small', 'large'
            
            const [dimensions, setDimensions] = useState({ w: 0, h: 0 });
            const [error, setError] = useState("");

            useEffect(() => {
                const load = async () => {
                    const loadImg = (url, size) => new Promise((resolve) => {
                        const img = new Image();
                        img.crossOrigin = "Anonymous";
                        img.onload = () => {
                            const c = document.createElement('canvas');
                            c.width = size; c.height = size;
                            c.getContext('2d').drawImage(img, 0, 0);
                            resolve(calculateAlphaMap(c.getContext('2d').getImageData(0,0,size,size)));
                        };
                        img.src = url;
                    });
                    try {
                        const [m48, m96] = await Promise.all([
                            loadImg('https://cdn.jsdelivr.net/gh/journey-ad/gemini-watermark-remover@main/src/assets/bg_48.png', 48),
                            loadImg('https://cdn.jsdelivr.net/gh/journey-ad/gemini-watermark-remover@main/src/assets/bg_96.png', 96)
                        ]);
                        setMask48(m48);
                        setMask96(m96);
                        setIsLoadingResources(false);
                    } catch (e) { setError("Load failed. Check connection."); }
                };
                load();
            }, []);

            const process = useCallback(async (srcImg) => {
                if (!srcImg || !mask48 || !mask96) return;
                setIsProcessing(true);
                await new Promise(r => setTimeout(r, 10)); // UI yield

                try {
                    const isLargeAuto = (srcImg.width > 1024 && srcImg.height > 1024);
                    let activeMask = mask48;
                    let isLarge = false;

                    if (forceMask === 'auto') {
                        if (isLargeAuto) { activeMask = mask96; isLarge = true; }
                    } else if (forceMask === 'large') {
                        activeMask = mask96; isLarge = true;
                    }
                    
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Pass offsets to function
                    const res = processImage(ctx, srcImg, activeMask, isLarge, strength, offsetX, offsetY);
                    ctx.putImageData(res, 0, 0);
                    setProcessedImageSrc(canvas.toDataURL());
                } catch (e) { console.error(e); } 
                finally { setIsProcessing(false); }
            }, [mask48, mask96, strength, offsetX, offsetY, forceMask]);

            // File Load
            const handleDrop = (file) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        setOriginalFile(file);
                        setOriginalImageSrc(e.target.result);
                        setDimensions({ w: img.width, h: img.height });
                        setZoom(1); setPan({x:0,y:0});
                        // Reset defaults
                        setStrength(1.0); setOffsetX(0); setOffsetY(0); setForceMask('auto');
                        process(img);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            };

            // Debounced Update
            useEffect(() => {
                const t = setTimeout(() => {
                    if (originalImageSrc && !isProcessing) {
                        const img = new Image();
                        img.src = originalImageSrc;
                        img.onload = () => process(img);
                    }
                }, 150);
                return () => clearTimeout(t);
            }, [strength, offsetX, offsetY, forceMask]);

            return (
                <div className="flex flex-col h-full bg-[#020617] text-slate-200 font-sans">
                    
                    {/* NAVBAR */}
                    <header className="h-14 md:h-16 border-b border-slate-800 bg-[#0f172a] flex items-center justify-between px-4 md:px-6 shrink-0 z-50">
                        <div className="flex items-center gap-2">
                            <div className="w-7 h-7 bg-cyber-600 rounded flex items-center justify-center font-bold">G</div>
                            <span className="font-bold text-white text-sm md:text-base">GIMG Cleaner <span className="text-cyber-500">v2.1</span></span>
                        </div>
                        <div className="text-[10px] md:text-xs font-mono text-slate-500 hidden md:block">MOBILE RESPONSIVE BUILD</div>
                    </header>

                    {/* MAIN CONTENT - Mobile: Canvas Top, Controls Bottom. Desktop: Row */}
                    <main className="flex-1 flex flex-col md:flex-row overflow-hidden relative">
                        
                        {/* CANVAS AREA */}
                        <div className="flex-1 bg-black relative flex flex-col min-h-0 order-1 md:order-2">
                            {!originalImageSrc ? (
                                <div className="absolute inset-0 grid-bg flex items-center justify-center p-6">
                                    <label className="flex flex-col items-center justify-center w-full h-64 border-2 border-dashed border-slate-700 rounded-2xl hover:border-cyber-500 bg-slate-900/50 transition-colors cursor-pointer">
                                        <input type="file" className="hidden" accept="image/*" onChange={(e)=>handleDrop(e.target.files[0])} />
                                        <div className="text-cyber-500 mb-4"><Icons.Upload /></div>
                                        <span className="text-slate-400 font-medium">Tap to Upload Image</span>
                                    </label>
                                </div>
                            ) : (
                                <>
                                    {/* Mobile Canvas Toolbar */}
                                    <div className="absolute top-4 left-1/2 -translate-x-1/2 glass-panel rounded-full px-3 py-1.5 z-30 flex items-center gap-2 md:gap-4 shadow-xl">
                                        <button onClick={()=>setZoom(z=>Math.max(0.2,z-0.2))}><Icons.ZoomOut/></button>
                                        <span className="font-mono text-[10px] w-8 text-center">{Math.round(zoom*100)}%</span>
                                        <button onClick={()=>setZoom(z=>Math.min(4,z+0.2))}><Icons.ZoomIn/></button>
                                    </div>
                                    <div className="flex-1 relative overflow-hidden checkerboard touch-none">
                                        {processedImageSrc && (
                                            <CompareSlider originalSrc={originalImageSrc} processedSrc={processedImageSrc} zoom={zoom} pan={pan} dimensions={dimensions} />
                                        )}
                                    </div>
                                </>
                            )}
                        </div>

                        {/* CONTROLS PANEL - Mobile: Bottom Sheet, Desktop: Sidebar */}
                        {originalImageSrc && (
                            <div className="w-full md:w-80 bg-[#0b0f19] border-t md:border-t-0 md:border-r border-slate-800 flex flex-col shrink-0 z-20 order-2 md:order-1 h-[45vh] md:h-auto overflow-y-auto">
                                <div className="p-4 md:p-6 space-y-6">
                                    
                                    {/* 1. Alignment Tool (The Fix for Two Logos) */}
                                    <div className="bg-slate-800/40 p-4 rounded-xl border border-white/5">
                                        <div className="flex items-center justify-between mb-3">
                                            <span className="text-xs font-bold text-cyber-500 uppercase flex items-center gap-2"><Icons.Move /> Alignment Fix</span>
                                            <button onClick={()=>{setOffsetX(0);setOffsetY(0)}} className="text-[10px] text-slate-500 hover:text-white underline">Reset</button>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-[10px] text-slate-400 block mb-1">Horizontal (X)</label>
                                                <input type="range" min="-50" max="50" value={offsetX} onChange={(e)=>setOffsetX(parseInt(e.target.value))} className="w-full h-1 bg-slate-600 rounded" />
                                                <div className="text-right text-[10px] font-mono text-cyber-500">{offsetX}px</div>
                                            </div>
                                            <div>
                                                <label className="text-[10px] text-slate-400 block mb-1">Vertical (Y)</label>
                                                <input type="range" min="-50" max="50" value={offsetY} onChange={(e)=>setOffsetY(parseInt(e.target.value))} className="w-full h-1 bg-slate-600 rounded" />
                                                <div className="text-right text-[10px] font-mono text-cyber-500">{offsetY}px</div>
                                            </div>
                                        </div>
                                        <p className="text-[10px] text-slate-500 mt-2 leading-tight">
                                            If you see "two logos" (a black ghost), adjust these sliders until the black ghost overlaps the white logo and disappears.
                                        </p>
                                    </div>

                                    {/* 2. Strength & Mask */}
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 uppercase mb-2 block">Cleaning Strength</label>
                                        <input type="range" min="0.5" max="1.5" step="0.05" value={strength} onChange={(e)=>setStrength(parseFloat(e.target.value))} className="w-full h-1 bg-slate-600 rounded mb-1" />
                                        <div className="flex justify-between text-[10px] text-slate-500">
                                            <span>Soft</span>
                                            <span>Aggressive</span>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-xs font-bold text-slate-400 uppercase mb-2 block">Mask Size Override</label>
                                        <div className="flex bg-slate-800 rounded-lg p-1">
                                            {['auto', 'small', 'large'].map(m => (
                                                <button 
                                                    key={m}
                                                    onClick={()=>setForceMask(m)}
                                                    className={`flex-1 py-1.5 text-[10px] uppercase font-medium rounded-md transition-colors ${forceMask===m ? 'bg-cyber-600 text-white shadow' : 'text-slate-400 hover:text-slate-200'}`}
                                                >
                                                    {m}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="pt-2">
                                        <button 
                                            onClick={() => {
                                                const link = document.createElement('a');
                                                link.download = `cleaned_${originalFile.name}`;
                                                link.href = processedImageSrc;
                                                link.click();
                                            }}
                                            className="w-full py-3 bg-white text-black hover:bg-slate-200 rounded-xl font-bold shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2 text-sm"
                                        >
                                            <Icons.Download /> Save to Device
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* ERROR TOAST */}
                    {error && (
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-red-500/90 text-white px-4 py-2 rounded-full text-xs shadow-xl backdrop-blur z-50 whitespace-nowrap">
                            {error} <button onClick={()=>setError("")} className="ml-2 font-bold">✕</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
